<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase - E-Commerce Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fa;
}

/* Header */

header{
background:#2563eb;
color:white;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:30px;
font-weight:bold;
}

.search-box input{
padding:10px;
width:250px;
border:none;
border-radius:6px;
}

/* Hero */

.hero{
height:60vh;
background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero h1{
font-size:55px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
}

/* Section */

section{
padding:60px 8%;
}

.section-title{
text-align:center;
font-size:40px;
margin-bottom:40px;
color:#2563eb;
}

/* Filter */

.filter{
text-align:center;
margin-bottom:30px;
}

.filter button{
padding:10px 20px;
margin:5px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

/* Products */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.product{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}

.product:hover{
transform:translateY(-8px);
}

.product img{
width:100%;
height:220px;
object-fit:cover;
}

.product-content{
padding:15px;
}

.product h3{
margin-bottom:10px;
}

.price{
font-size:22px;
color:#22c55e;
font-weight:bold;
margin-bottom:10px;
}

.product button{
padding:10px 15px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* Cart */

.cart{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-top:50px;
}

.cart h2{
margin-bottom:20px;
color:#2563eb;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
padding-bottom:10px;
border-bottom:1px solid #ddd;
}

.remove{
background:red;
color:white;
border:none;
padding:5px 10px;
cursor:pointer;
border-radius:4px;
}

/* Checkout */

.checkout{
margin-top:40px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.checkout input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

.checkout button{
padding:12px 20px;
background:#22c55e;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* Footer */

footer{
background:#111827;
color:white;
text-align:center;
padding:20px;
margin-top:50px;
}

@media(max-width:768px){

.hero h1{
font-size:35px;
}

.search-box input{
width:100%;
margin-top:10px;
}

header{
flex-direction:column;
gap:10px;
}

}

</style>
</head>
<body>

<header>

<div class="logo">ShopEase</div>

<div class="search-box">
<input
type="text"
id="search"
placeholder="Search Products..."
onkeyup="searchProducts()">
</div>

</header>

<div class="hero">

<div>
<h1>Welcome to ShopEase</h1>
<p>Find Your Favorite Products</p>
</div>

</div>

<section>

<h2 class="section-title">Our Products</h2>

<div class="filter">
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('electronics')">Electronics</button>
<button onclick="filterProducts('fashion')">Fashion</button>
<button onclick="filterProducts('accessories')">Accessories</button>
</div>

<div class="products" id="products">

<div class="product electronics">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600">
<div class="product-content">
<h3>Smartphone</h3>
<div class="price">₹25,000</div>
<button onclick="addToCart('Smartphone',25000)">
Add to Cart
</button>
</div>
</div>

<div class="product fashion">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600">
<div class="product-content">
<h3>T-Shirt</h3>
<div class="price">₹999</div>
<button onclick="addToCart('T-Shirt',999)">
Add to Cart
</button>
</div>
</div>

<div class="product accessories">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600">
<div class="product-content">
<h3>Smart Watch</h3>
<div class="price">₹4,999</div>
<button onclick="addToCart('Smart Watch',4999)">
Add to Cart
</button>
</div>
</div>

<div class="product electronics">
<img src="https://cdn.thewirecutter.com/wp-content/media/2024/07/laptopstopicpage-2048px-3685-2x1-1.jpg?width=2048&quality=75&crop=2:1&auto=webp">
<div class="product-content">
<h3>Laptop</h3>
<div class="price">₹55,000</div>
<button onclick="addToCart('Laptop',55000)">
Add to Cart
</button>
</div>
</div>

</div>

<div class="cart">

<h2>Shopping Cart</h2>

<div id="cartItems"></div>

<h3>Total: ₹<span id="total">0</span></h3>

</div>

<div class="checkout">

<h2>Checkout</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="text" placeholder="Address">

<button onclick="checkout()">
Place Order
</button>

</div>

</section>

<footer>
© 2026 ShopEase E-Commerce Website
</footer>

<script>

let cart = [];
let total = 0;

function addToCart(name,price){

cart.push({name,price});

total += price;

displayCart();

}

function displayCart(){

let cartItems =
document.getElementById("cartItems");

cartItems.innerHTML = "";

cart.forEach((item,index)=>{

cartItems.innerHTML += `
<div class="cart-item">
<span>${item.name} - ₹${item.price}</span>

<button class="remove"
onclick="removeItem(${index})">
Remove
</button>
</div>
`;

});

document.getElementById("total")
innerText = total;

}

function removeItem(index){

total -= cart[index].price;

cart.splice(index,1);

displayCart();

}

function checkout(){

if(cart.length===0){

alert("Cart is empty!");

return;

}

alert(
"Order Placed Successfully!"
);

cart=[];
total=0;

displayCart();

}

function searchProducts(){

let input =
document.getElementById("search")
.value.toLowerCase();

let products =
document.querySelectorAll(".product");

products.forEach(product=>{

let text =
product.innerText.toLowerCase();

product.style.display =
text.includes(input)
? "block"
: "none";

});

}

function filterProducts(category){

let products =
document.querySelectorAll(".product");

products.forEach(product=>{

if(
category==="all" ||
product.classList.contains(category)
){

product.style.display="block";

}else{

product.style.display="none";

}

});

}

</script>

</body>
</html>
